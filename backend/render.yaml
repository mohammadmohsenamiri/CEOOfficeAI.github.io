services:
  - type: web
    name: ceo-office-ai-coordinator-preview
    env: node
    plan: free
    buildCommand: ""
    startCommand: "node server.js"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: AI_PROVIDER
        value: disabled
      - key: AI_MODEL
        value: gpt-5.4-mini
      - key: AI_BASE_URL
        value: https://api.openai.com
