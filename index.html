<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEO Office AI Coordinator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #667085;
      --line: #d7dde5;
      --soft: #f5f7fa;
      --panel: #ffffff;
      --brand: #0f766e;
      --brand-2: #1d4ed8;
      --warn: #b45309;
      --danger: #b42318;
      --ok: #15803d;
      --shadow: 0 10px 30px rgba(23, 32, 42, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--soft);
      color: var(--ink);
      font-family: Tahoma, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      min-height: 38px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button:hover { border-color: #9aa7b6; }
    button.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    button.blue { background: var(--brand-2); border-color: var(--brand-2); color: #fff; }
    button.danger { color: var(--danger); border-color: #f4c7c3; }
    button.ghost { background: transparent; }
    button.icon { width: 40px; padding: 0; display: inline-grid; place-items: center; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 12px;
      min-height: 40px;
    }

    textarea { min-height: 92px; resize: vertical; }
    label { display: grid; gap: 7px; color: #344054; font-size: 13px; }

    .app {
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr);
      min-height: 100vh;
    }

    .app.logged-out aside,
    .app.logged-out main { display: none; }

    .auth-screen {
      grid-column: 1 / -1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 28px 90px rgba(15, 23, 42, .14);
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .auth-form { display: grid; gap: 12px; }

    aside {
      background: #fff;
      border-left: 1px solid var(--line);
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: grid;
      gap: 7px;
      margin-bottom: 22px;
    }

    .brand strong { font-size: 20px; }
    .brand span { color: var(--muted); font-size: 13px; line-height: 1.7; }

    nav {
      display: grid;
      gap: 8px;
    }

    .nav-button {
      width: 100%;
      text-align: right;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-color: transparent;
      background: transparent;
    }

    .nav-button.active {
      background: #e7f5f3;
      border-color: #b8dfda;
      color: #0f5f58;
      font-weight: 700;
    }

    .session {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    main {
      padding: 22px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 24px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric, .panel, .item-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      padding: 16px;
      display: grid;
      gap: 8px;
    }

    .metric b { font-size: 26px; color: var(--brand); }

    .grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 14px;
      align-items: start;
    }

    .panel {
      padding: 16px;
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .full { grid-column: 1 / -1; }

    .list {
      display: grid;
      gap: 10px;
    }

    .item-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      box-shadow: none;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chips {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #eef2f6;
      border: 1px solid #dde4ec;
      color: #344054;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      white-space: nowrap;
    }

    .chip.ok { background: #e8f7ee; border-color: #bfe6ce; color: var(--ok); }
    .chip.warn { background: #fff4e5; border-color: #fed7aa; color: var(--warn); }
    .chip.danger { background: #fff0f0; border-color: #fecaca; color: var(--danger); }
    .chip.blue { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }

    .tabs, .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tabs button.active, .segmented button.active {
      background: #17202a;
      color: #fff;
      border-color: #17202a;
    }

    .table-wrap { overflow: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 11px 10px;
      text-align: right;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      color: #475467;
      background: #f8fafc;
      position: sticky;
      top: 0;
    }

    .ai-box {
      background: #f8fafc;
      border: 1px dashed #b8c3cf;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    pre {
      direction: ltr;
      text-align: left;
      white-space: pre-wrap;
      background: #101828;
      color: #e7edf5;
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
      margin: 0;
      font-family: Consolas, monospace;
      font-size: 12px;
    }

    .toast {
      position: fixed;
      inset-inline: 20px auto;
      bottom: 20px;
      max-width: min(420px, calc(100vw - 40px));
      background: #17202a;
      color: #fff;
      padding: 12px 14px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 30;
    }

    .toast.show { display: block; }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      aside { position: relative; height: auto; border-left: 0; border-bottom: 1px solid var(--line); }
      nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      main { padding: 14px; }
      .topbar, .panel-head, .item-top { align-items: stretch; flex-direction: column; }
      .form-grid, .metrics, nav { grid-template-columns: 1fr; }
      button { width: 100%; }
      button.icon { width: 40px; }
    }

    /* Manus-inspired dark dashboard polish */
    :root {
      --ink: #eef2ff;
      --muted: #98a2b3;
      --line: rgba(148, 163, 184, .18);
      --soft: #090b12;
      --panel: rgba(20, 24, 38, .78);
      --brand: #8b5cf6;
      --brand-2: #06b6d4;
      --warn: #f59e0b;
      --danger: #f87171;
      --ok: #34d399;
      --shadow: 0 24px 70px rgba(0, 0, 0, .34);
      --glow: 0 0 0 1px rgba(139, 92, 246, .12), 0 20px 70px rgba(7, 10, 20, .42);
      --surface: rgba(15, 19, 32, .88);
      --surface-2: rgba(255, 255, 255, .055);
      --text-strong: #f8fafc;
    }

    body {
      background:
        radial-gradient(circle at 82% 8%, rgba(139, 92, 246, .22), transparent 34%),
        radial-gradient(circle at 12% 82%, rgba(6, 182, 212, .14), transparent 30%),
        linear-gradient(145deg, #080a12 0%, #101522 52%, #090b12 100%);
      color: var(--ink);
      font-family: Vazirmatn, Tahoma, "Segoe UI", Arial, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .75), transparent 80%);
    }

    .app {
      grid-template-columns: 292px minmax(0, 1fr);
    }

    aside {
      background: rgba(9, 11, 18, .78);
      border-left: 1px solid var(--line);
      backdrop-filter: blur(18px);
      box-shadow: 24px 0 80px rgba(0, 0, 0, .22);
    }

    .brand {
      background: linear-gradient(145deg, rgba(139, 92, 246, .16), rgba(6, 182, 212, .08));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: var(--glow);
    }

    .brand strong {
      color: var(--text-strong);
      line-height: 1.35;
    }

    .brand strong::before {
      content: "AI";
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      margin-left: 10px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #fff;
      font-size: 13px;
      vertical-align: middle;
      box-shadow: 0 12px 28px rgba(139, 92, 246, .28);
    }

    .brand span {
      color: #aeb8ca;
    }

    nav {
      gap: 7px;
    }

    .nav-button {
      color: #cbd5e1;
      border: 1px solid transparent;
      min-height: 44px;
      border-radius: 8px;
      padding: 10px 12px;
      justify-content: flex-start;
      direction: rtl;
      transition: background .18s ease, border-color .18s ease, color .18s ease, transform .18s ease;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, .055);
      border-color: rgba(148, 163, 184, .12);
      transform: translateX(-2px);
    }

    .nav-button.active {
      background: linear-gradient(135deg, rgba(139, 92, 246, .20), rgba(6, 182, 212, .10));
      border-color: rgba(139, 92, 246, .34);
      color: #fff;
      box-shadow: 0 12px 34px rgba(139, 92, 246, .13);
    }

    .nav-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      width: 100%;
      justify-content: flex-start;
      direction: rtl;
    }

    .nav-arrow {
      display: inline-grid;
      place-items: center;
      width: 18px;
      color: #7dd3fc;
      transform: none;
    }

    .nav-icon {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .055);
      border: 1px solid rgba(255, 255, 255, .075);
      color: #a5b4fc;
      font-size: 15px;
      line-height: 1;
    }

    .svg-icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      flex: 0 0 auto;
    }

    .metric-icon, .card-icon {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(139, 92, 246, .22), rgba(6, 182, 212, .12));
      border: 1px solid rgba(255, 255, 255, .10);
      color: #c4b5fd;
      box-shadow: 0 14px 36px rgba(139, 92, 246, .14);
    }

    .card-icon {
      width: 34px;
      height: 34px;
      color: #67e8f9;
    }

    .nav-button.active .nav-icon {
      background: linear-gradient(135deg, rgba(139, 92, 246, .36), rgba(6, 182, 212, .22));
      color: #fff;
      border-color: rgba(255, 255, 255, .14);
    }

    .session {
      border-top-color: var(--line);
    }

    main {
      padding: 30px;
      gap: 22px;
    }

    .topbar {
      min-height: 74px;
      padding: 14px 18px;
      background: rgba(9, 11, 18, .44);
      border: 1px solid var(--line);
      border-radius: 8px;
      backdrop-filter: blur(14px);
      box-shadow: var(--glow);
    }

    h1 {
      color: var(--text-strong);
      font-size: 30px;
      font-weight: 900;
      line-height: 1.25;
    }

    h2 {
      color: var(--text-strong);
      font-size: 18px;
      font-weight: 800;
    }

    h3 {
      color: #f1f5f9;
      font-size: 15px;
      font-weight: 750;
      line-height: 1.7;
    }

    .muted {
      color: var(--muted);
    }

    .metrics {
      gap: 14px;
    }

    .metric, .panel, .item-card {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--glow);
      backdrop-filter: blur(16px);
    }

    .metric {
      min-height: 132px;
      padding: 20px;
      overflow: hidden;
      position: relative;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      animation: slideUp .35s ease both;
    }

    .metric::after {
      content: "";
      position: absolute;
      inset: auto -18px -24px auto;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(139, 92, 246, .10);
      filter: blur(18px);
    }

    .metric:hover, .item-card:hover, .panel:hover {
      border-color: rgba(139, 92, 246, .32);
    }

    .metric b {
      color: var(--text-strong);
      font-size: 31px;
      font-weight: 900;
    }

    .panel {
      padding: 18px;
      border-radius: 8px;
    }

    .item-card {
      background: rgba(255, 255, 255, .045);
      border-radius: 8px;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .item-card:hover {
      background: rgba(255, 255, 255, .062);
      transform: translateY(-1px);
    }

    button {
      background: rgba(255, 255, 255, .055);
      border-color: var(--line);
      color: #e5e7eb;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    button:hover {
      border-color: rgba(139, 92, 246, .38);
      background: rgba(255, 255, 255, .08);
      transform: translateY(-1px);
    }

    button.primary, button.blue {
      border: 0;
      color: white;
      box-shadow: 0 16px 38px rgba(139, 92, 246, .18);
    }

    button.primary {
      background: linear-gradient(135deg, #8b5cf6, #14b8a6);
    }

    button.blue {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
    }

    button.danger {
      background: rgba(248, 113, 113, .10);
      border-color: rgba(248, 113, 113, .28);
      color: #fecaca;
    }

    input, select, textarea {
      background: rgba(2, 6, 23, .42);
      border-color: var(--line);
      color: #f8fafc;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(139, 92, 246, .56);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, .12);
    }

    label {
      color: #cbd5e1;
    }

    .auth-screen {
      background:
        radial-gradient(circle at 72% 18%, rgba(139, 92, 246, .22), transparent 34%),
        radial-gradient(circle at 18% 84%, rgba(6, 182, 212, .14), transparent 30%),
        linear-gradient(145deg, #080a12 0%, #101522 52%, #090b12 100%);
    }

    .auth-card {
      background: rgba(15, 19, 32, .92);
      border-color: rgba(139, 92, 246, .30);
      box-shadow: var(--glow);
      backdrop-filter: blur(18px);
    }

    .auth-card .brand {
      margin-bottom: 2px;
    }

    .auth-card .tabs {
      background: rgba(2, 6, 23, .28);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px;
    }

    .auth-card .tabs button {
      min-height: 44px;
      color: #cbd5e1;
      border-color: transparent;
      background: transparent;
    }

    .auth-card .tabs button.active {
      color: #fff;
      background: linear-gradient(135deg, rgba(139, 92, 246, .92), rgba(6, 182, 212, .76));
      box-shadow: 0 14px 34px rgba(20, 184, 166, .16);
    }

    .auth-card label {
      color: #dbeafe;
      font-weight: 750;
    }

    .auth-card input {
      min-height: 46px;
      background: rgba(2, 6, 23, .62);
      border-color: rgba(148, 163, 184, .22);
      color: #f8fafc;
    }

    .auth-card input::placeholder {
      color: #94a3b8;
    }

    .auth-card button.primary {
      min-height: 48px;
      font-weight: 850;
    }

    .chip {
      background: rgba(255, 255, 255, .06);
      border-color: rgba(255, 255, 255, .10);
      color: #cbd5e1;
    }

    .chip.ok {
      background: rgba(52, 211, 153, .12);
      border-color: rgba(52, 211, 153, .26);
      color: #86efac;
    }

    .chip.warn {
      background: rgba(245, 158, 11, .12);
      border-color: rgba(245, 158, 11, .26);
      color: #fcd34d;
    }

    .chip.danger {
      background: rgba(248, 113, 113, .12);
      border-color: rgba(248, 113, 113, .26);
      color: #fecaca;
    }

    .chip.blue {
      background: rgba(6, 182, 212, .12);
      border-color: rgba(6, 182, 212, .28);
      color: #67e8f9;
    }

    .ai-box {
      background: rgba(2, 6, 23, .30);
      border-color: rgba(139, 92, 246, .25);
      border-style: solid;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04);
    }

    pre {
      background: rgba(2, 6, 23, .78);
      border: 1px solid rgba(148, 163, 184, .16);
      color: #dbeafe;
    }

    th {
      background: rgba(15, 23, 42, .92);
      color: #cbd5e1;
    }

    td {
      color: #e2e8f0;
    }

    table {
      background: transparent;
    }

    th, td {
      border-bottom-color: var(--line);
    }

    .toast {
      background: rgba(15, 23, 42, .94);
      border: 1px solid rgba(139, 92, 246, .28);
      color: #fff;
      backdrop-filter: blur(14px);
    }

    .calendar-shell {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }

    .calendar-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .calendar-title {
      display: grid;
      gap: 4px;
    }

    .calendar-title strong {
      color: #fff;
      font-size: 22px;
      font-weight: 900;
    }

    .calendar-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin: 14px 0;
    }

    .calendar-picker {
      display: flex;
      gap: 8px;
      align-items: end;
      flex-wrap: wrap;
      position: relative;
    }

    .calendar-picker label {
      min-width: 86px;
      margin: 0;
    }

    .calendar-picker input {
      height: 38px;
      padding: 0 10px;
    }

    .persian-date-picker {
      position: relative;
      min-width: min(320px, 100%);
    }

    .date-picker-popover {
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(15, 23, 42, .98);
      margin-top: 8px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .42);
      position: absolute;
      inset-inline-start: 0;
      top: calc(100% + 8px);
      width: min(360px, calc(100vw - 40px));
      z-index: 90;
    }

    .date-picker-popover.hidden {
      display: none;
    }

    .calendar-picker-popover {
      grid-template-columns: repeat(3, minmax(72px, 1fr)) auto;
      align-items: end;
    }

    .date-picker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .date-picker-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(34px, 1fr));
      gap: 6px;

        { id: "MSG-1", source: "telegram", sender: "1002", text: "برای سارا و حسین وظیفه گزارش فروش تا شنبه بساز", status: "parsed", parsedIntent: { intent: "create_task", title: "گزارش فروش", assignees: ["سارا احمدی", "حسین نوری"], needsConfirmation: true } }
      ],
      notifications: []
    };

    const MOCK_DATA_ENABLED = false;
    let state = loadState();

    let calendarView = "month";
    let calendarFocusDate = new Date();

    const savedAuthUserId = localStorage.getItem(authUserKey);

    function loadState() {
      const saved = localStorage.getItem(storageKey);
      if (!saved) return structuredClone(seed);
      try { return JSON.parse(saved); } catch { return structuredClone(seed); }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function user(id) {
      return state.users.find((u) => u.id === id);
    }

    async function loadBackendState() {
      const [users, groups, tasks, recurringTasks, requests, meetings, messages] = await Promise.all([
        backendFetch("/api/users"),
        backendFetch("/api/groups"),
        backendFetch("/api/tasks"),
        backendFetch("/api/recurring-tasks"),
        backendFetch("/api/ceo-requests"),
        backendFetch("/api/meetings"),
        backendFetch("/api/messages")
      ]);
      const groupTitle = (groupId) => groups.find((group) => group.id === groupId)?.title || groupId || "";
      state.users = users.map((item) => ({
        id: item.id,
        fullName: item.fullName,
        jobTitle: item.jobTitle,
        role: item.role,
        group: groupTitle(item.groups?.[0]),
        groupIds: item.groups || [],
        telegram: item.telegramChatId || "",
        bale: item.baleChatId || "",
        baleUsername: item.baleUsername || "",
        baleProfileUrl: item.baleProfileUrl || "",
        username: item.username || "",
        active: item.active,
        isCeo: item.isCeo
      }));
      state.groups = groups;
      state.tasks = tasks.map((item) => ({
        id: item.id,
        title: item.title,
        description: item.description,
        creatorId: item.creatorId,
        group: groupTitle(item.groupId),
        groupId: item.groupId,
        type: item.visibility === "ceo_private" ? "ceo_private" : "task",
        dueAt: item.dueAt,
        longTerm: Boolean(item.longTerm || !item.dueAt),
        visibility: item.visibility,
        assignees: (item.assignments || []).map((assignment) => ({
          userId: assignment.userId,
          status: assignment.status,
          rejectReason: assignment.rejectReason || "",
          doneAt: assignment.doneAt || ""
        }))
      }));
      state.recurringTasks = recurringTasks.map((item) => ({
        id: item.id,
        title: item.title,
        description: item.description,
        creatorId: item.creatorId,
        group: groupTitle(item.groupId),
        groupId: item.groupId,
        assigneeIds: item.assigneeIds || [],
        cycle: item.cycle || "daily",
        interval: item.interval || 1,
        daysOfWeek: item.daysOfWeek || [],
        dayOfMonth: item.dayOfMonth || "",
        time: item.time || "09:00",
        nextRunAt: item.nextRunAt,
        active: item.active !== false
      }));
      state.requests = requests.map((item) => ({
        id: item.id,
        title: item.title,
        description: item.description,
        requesterId: item.requesterId,
        ceoId: item.ceoId,
        status: item.status,
        decisionReason: item.decisionReason || "",
        delegatedTaskId: item.delegatedTaskId || ""
      }));
      state.meetings = meetings;
      state.messages = messages.map((item) => ({
        id: item.id,
        source: item.source,
        sender: item.senderMessengerId,
        text: item.text,
        status: item.status,
        parsedIntent: item.parsedIntent || {}
      }));
    }

    function currentUser() {
      return user(state.currentUserId) || state.users[0];
    }

    function isLoggedIn() {
      return Boolean(localStorage.getItem(authUserKey));
    }

    function isPrivileged() {
      const u = currentUser();
      return u.role === "Admin" || u.role === "CEO";
    }

    function visiblePages() {
      const u = currentUser();
      return pages.filter(([id]) => {
        if (["requests", "users", "analytics", "offline", "bale"].includes(id)) return u.role === "Admin" || u.role === "CEO";
        return true;
      });
    }

    function fa(value) {
      return nf.format(value);
    }

    function dateFa(value) {
      return df.format(new Date(value));
    }

    function uid(prefix) {
      return `${prefix}-${Math.floor(Date.now() / 10).toString().slice(-6)}`;
    }

    function toast(text) {
      const box = $("toast");
      box.textContent = text;
      box.classList.add("show");
      setTimeout(() => box.classList.remove("show"), 2600);
    }

    function visibleTasks() {
      const u = currentUser();
      return state.tasks.filter((task) => {
        const hasMe = task.creatorId === u.id || task.assignees.some((a) => a.userId === u.id);
        if (task.visibility === "ceo_private") return u.role === "CEO" || task.creatorId === u.id || task.assignees.some((a) => a.userId === u.id);
        if (isPrivileged()) return true;
        return hasMe;
      });
    }

    function visibleTimedTasks() {
      return visibleTasks().filter((task) => !task.longTerm);
    }

    function visibleLongTermTasks() {
      return visibleTasks().filter((task) => task.longTerm);
    }

    function visibleRecurringTasks() {
      const u = currentUser();
      return (state.recurringTasks || []).filter((task) => {
        if (isPrivileged()) return true;
        if (task.creatorId === u.id) return true;
        if ((task.assigneeIds || []).includes(u.id)) return true;
        return false;
      });
    }

    function assignableUsers() {
      return state.users.filter((u) => u.active && !u.isCeo);
    }

    function visibleRequests() {
      const u = currentUser();
      return state.requests.filter((r) => u.role === "CEO" || r.requesterId === u.id || u.role === "Admin");
    }

    function canAssignTo(assigneeIds) {
      const actor = currentUser();
      const ceo = state.users.find((u) => u.isCeo);
      if (!ceo) return true;
      if (!assigneeIds.includes(ceo.id)) return true;
      return actor.role === "CEO" && assigneeIds.every((id) => id === ceo.id);
    }

    function statusChip(status) {
      const labels = { pending: "در انتظار", accepted: "قبول شده", rejected: "رد شده", done: "انجام شد", scheduled: "برنامه‌ریزی‌شده", cancelled: "لغو شده", approved: "تایید شده", delegated: "ارجاع شده" };
      const cls = status === "done" || status === "approved" ? "ok" : status === "rejected" || status === "cancelled" ? "danger" : status === "accepted" || status === "delegated" ? "blue" : "warn";
      return `<span class="chip ${cls}">${labels[status] || status}</span>`;
    }

    function bindAuthForms() {
      if ($("loginScreen")?.dataset.bound === "true") return;
      $("loginScreen").dataset.bound = "true";
      document.querySelectorAll("[data-auth-tab]").forEach((btn) => {
        btn.onclick = () => {
          document.querySelectorAll("[data-auth-tab]").forEach((item) => item.classList.remove("active"));
          btn.classList.add("active");
          $("loginForm").classList.toggle("hidden", btn.dataset.authTab !== "login");
          $("passwordLoginForm").classList.toggle("hidden", btn.dataset.authTab !== "password");
          $("signupForm").classList.toggle("hidden", btn.dataset.authTab !== "signup");
        };
      });
      $("requestLoginCode").onclick = async () => {
        const identifier = new FormData($("loginForm")).get("identifier");
        if (!identifier) return toast("آیدی بله یا نام کاربری را وارد کنید.");
        try {
          await backendFetch("/api/auth/request-code", { method: "POST", body: JSON.stringify({ identifier }) });
          toast("کد ورود به بله ارسال شد.");
        } catch (error) { toast(error.message); }
      };
      $("loginForm").onsubmit = async (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(event.target).entries());
        try {
          const result = await backendFetch("/api/auth/login", { method: "POST", body: JSON.stringify(payload) });
          localStorage.setItem(authUserKey, result.user.id);
          state.currentUserId = result.user.id;
          await loadBackendState();
          render();
          toast("ورود انجام شد.");
        } catch (error) { toast(error.message); }
      };
      $("passwordLoginForm").onsubmit = async (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(event.target).entries());
        try {
          const result = await backendFetch("/api/auth/login-password", { method: "POST", body: JSON.stringify(payload) });
          localStorage.setItem(authUserKey, result.user.id);
          state.currentUserId = result.user.id;
          await loadBackendState();
          render();
          toast("ورود انجام شد.");
        } catch (error) { toast(error.message); }
      };
      $("signupForm").onsubmit = async (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(event.target).entries());
        try {
          await backendFetch("/api/auth/signup", { method: "POST", body: JSON.stringify(payload) });
          event.target.reset();
          toast("درخواست حساب ثبت شد و در انتظار تایید ادمین است.");
        } catch (error) { toast(error.message); }
      };
    }

      const navPages = visiblePages();

        activePage = btn.dataset.page;

        render();
      }));

      $("currentUser").innerHTML = `<option value="${currentUser().id}">${currentUser().fullName} - ${currentUser().role}</option>`;

        meetings: renderMeetings,

      $("recurringTaskModal").onclick = (event) => {
        if (event.target.id === "recurringTaskModal") $("recurringTaskModal").classList.add("hidden");

      $("recurringTaskForm").onsubmit = createRecurringTask;
      bindDatePresets("recurring");
      bindPersianDatePicker("recurring");

    function createRecurringTask(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const assigneeIds = Array.from(event.target.assignees.selectedOptions).map((option) => option.value);
      if (!assigneeIds.length) return toast("حداقل یک مسئول انتخاب کنید.");
      const groupName = form.get("group").trim() || currentUser().group;
      const groupId = state.groups?.find((group) => group.title === groupName)?.id || currentUser().groupIds?.[0] || "g3";
      const payload = {
        title: form.get("title").trim(),
        description: form.get("description").trim(),
        groupId,
        assigneeIds,
        cycle: form.get("cycle"),
        interval: Number(form.get("interval")) || 1,
        time: form.get("time") || "09:00",
        startAt: new Date(form.get("startAt")).toISOString()
      };
      if (backendOnline) {
        backendFetch("/api/recurring-tasks", { method: "POST", body: JSON.stringify(payload) }).then(async () => {
          $("recurringTaskModal")?.classList.add("hidden");
          await loadBackendState();
          renderRecurringTasks();
          toast("چرخه تکرار در backend ثبت شد.");
        }).catch((error) => toast(error.message));
        return;
      }
      state.recurringTasks.unshift({ id: uid("RT"), creatorId: currentUser().id, group: groupName, groupId, active: true, nextRunAt: payload.startAt, ...payload });
      saveState();
      $("recurringTaskModal")?.classList.add("hidden");
      renderRecurringTasks();
      toast("چرخه تکرار ثبت شد.");
    }

    function bindRecurringTaskActions() {
      document.querySelectorAll("[data-delete-recurring]").forEach((btn) => {
        btn.onclick = async () => {
          const recurringTaskId = btn.dataset.deleteRecurring;
          if (backendOnline) {
            try {
              await backendFetch("/api/recurring-tasks", { method: "DELETE", body: JSON.stringify({ recurringTaskId }) });

    function createTask(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const assignees = Array.from(event.target.assignees.selectedOptions).map((o) => o.value);
      const longTerm = event.target.dataset.longTerm === "true";
      if (!assignees.length) return toast("حداقل یک مسئول انتخاب کنید.");
      if (backendOnline) {
        const groupName = form.get("group").trim() || currentUser().group;
        const groupId = state.groups?.find((group) => group.title === groupName)?.id || currentUser().groupIds?.[0] || "g3";
        backendFetch("/api/tasks", {
          method: "POST",
          body: JSON.stringify({
            title: form.get("title").trim(),
            description: form.get("description").trim(),
            groupId,
            dueAt: longTerm ? "" : new Date(form.get("dueAt")).toISOString(),
            longTerm,
            assigneeIds: assignees
          })
        }).then(async () => {
          $(longTerm ? "longTermTaskModal" : "taskModal")?.classList.add("hidden");
          await loadBackendState();
          longTerm ? renderLongTermTasks() : renderTasks();
          toast(longTerm ? "وظیفه بلندمدت در backend ثبت شد." : "وظیفه در backend ثبت شد.");
        }).catch((error) => toast(error.message));
        return;
      }
      if (!canAssignTo(assignees)) return toast("تعریف مستقیم وظیفه برای مدیرعامل مجاز نیست. از بخش درخواست از مدیرعامل استفاده کنید.");
      const task = {
        id: uid("T"),
        title: form.get("title").trim(),
        description: form.get("description").trim(),
        creatorId: currentUser().id,
        group: form.get("group").trim() || currentUser().group,
        type: assignees.some((id) => user(id)?.isCeo) ? "ceo_private" : "task",
        dueAt: longTerm ? "" : new Date(form.get("dueAt")).toISOString(),
        longTerm,
        visibility: assignees.some((id) => user(id)?.isCeo) ? "ceo_private" : "group",
        assignees: assignees.map((id) => ({ userId: id, status: "pending", rejectReason: "", doneAt: "" }))
      };
      state.tasks.unshift(task);
      saveState();
      $(longTerm ? "longTermTaskModal" : "taskModal")?.classList.add("hidden");
      longTerm ? renderLongTermTasks() : renderTasks();
      toast(longTerm ? "وظیفه بلندمدت ثبت شد." : "وظیفه ثبت شد و نوتیف assign ساخته شد.");
    }

    function renderCalendarView() {
      if (calendarView === "week") return calendarWeek();
      if (calendarView === "day") return calendarDay();
      return calendarMonth();
    }

    function calendarMonth() {
      const base = new Date(calendarFocusDate);
      const year = base.getFullYear();
      const month = base.getMonth();
      const first = new Date(year, month, 1);
      const startOffset = (first.getDay() + 1) % 7;
      const start = new Date(year, month, 1 - startOffset);
      const weekdays = ["شنبه", "یکشنبه", "دوشنبه", "سه‌شنبه", "چهارشنبه", "پنجشنبه", "جمعه"];
      const cells = [];
      for (let i = 0; i < 42; i++) {
        const day = new Date(start);
        day.setDate(start.getDate() + i);
        const dayMeetings = state.meetings.filter((meeting) => sameLocalDay(new Date(meeting.startAt), day));
        const dim = day.getMonth() !== month ? "dim" : "";
        const today = sameLocalDay(day, new Date()) ? "today" : "";
        cells.push(`
          <div class="calendar-day ${dim} ${today}" data-drop-date="${localDateValue(day)}">
            <span class="day-number">${fa(new Intl.DateTimeFormat("fa-IR-u-ca-persian", { day: "numeric" }).format(day).replace(/[۰-۹]/g, (d) => "۰۱۲۳۴۵۶۷۸۹".indexOf(d)))}</span>
            ${dayMeetings.slice(0, 3).map((meeting) => eventPill(meeting)).join("")}
          </div>`);
      }
      return `<div class="calendar-grid">${weekdays.map((day) => `<div class="calendar-weekday">${day}</div>`).join("")}${cells.join("")}</div>`;
    }

    function startOfPersianWeek(date) {
      const start = new Date(date);
      const offset = (start.getDay() + 1) % 7;
      start.setDate(start.getDate() - offset);
      start.setHours(0, 0, 0, 0);
      return start;
    }

    function calendarWeek() {
      const weekdays = ["شنبه", "یکشنبه", "دوشنبه", "سه‌شنبه", "چهارشنبه", "پنجشنبه", "جمعه"];
      const start = startOfPersianWeek(calendarFocusDate);
      const hours = Array.from({ length: 14 }, (_, index) => index + 7);
      const columns = [];
      for (let i = 0; i < 7; i++) {
        const day = new Date(start);
        day.setDate(start.getDate() + i);
        const cells = hours.map((hour) => {
          const meetings = state.meetings.filter((meeting) => sameLocalDay(new Date(meeting.startAt), day) && new Date(meeting.startAt).getHours() === hour);
          return `<div class="week-hour-cell" data-drop-date="${localDateValue(day)}" data-drop-hour="${hour}">${meetings.map((meeting) => eventPill(meeting)).join("")}</div>`;
        }).join("");
        columns.push(`
          <div class="week-column">
            <header><span>${weekdays[i]}</span><span class="muted small">${new Intl.DateTimeFormat("fa-IR-u-ca-persian", { day: "numeric", month: "short" }).format(day)}</span></header>
            ${cells}
          </div>`);
      }
      return `<div class="calendar-week-view"><div class="week-hour-rail"><span></span>${hours.map((hour) => `<span>${fa(hour)}:۰۰</span>`).join("")}</div>${columns.join("")}</div>`;
    }

    function calendarDay() {
      const today = new Date(calendarFocusDate);
      const rows = [];
      for (let hour = 7; hour <= 20; hour++) {
        const meetings = state.meetings.filter((meeting) => sameLocalDay(new Date(meeting.startAt), today) && new Date(meeting.startAt).getHours() === hour);
        rows.push(`
          <div class="hour-row">
            <div class="hour-label">${fa(hour)}:۰۰</div>
            <div class="hour-cell" data-drop-date="${localDateValue(today)}" data-drop-hour="${hour}">${meetings.map((meeting) => eventPill(meeting)).join("")}</div>
          </div>`);
      }
      return `<div class="panel-head"><h2>برنامه روزانه</h2><span class="chip blue">${new Intl.DateTimeFormat("fa-IR-u-ca-persian", { dateStyle: "full" }).format(today)}</span></div><div class="calendar-day-view">${rows.join("")}</div>`;
    }

    function eventPill(meeting) {
      return `<div class="event-pill" draggable="true" data-meeting-id="${meeting.id}"><strong>${meeting.title}</strong><span>${timeFa(meeting.startAt)} · ${meeting.location || "بدون مکان"}</span></div>`;
    }

    function calendarViewTitle() {
      if (calendarView === "day") return new Intl.DateTimeFormat("fa-IR-u-ca-persian", { dateStyle: "full" }).format(calendarFocusDate);
      if (calendarView === "week") {
        const start = startOfPersianWeek(calendarFocusDate);
        const end = new Date(start);
        end.setDate(start.getDate() + 6);
        return `${new Intl.DateTimeFormat("fa-IR-u-ca-persian", { day: "numeric", month: "short" }).format(start)} تا ${new Intl.DateTimeFormat("fa-IR-u-ca-persian", { day: "numeric", month: "short", year: "numeric" }).format(end)}`;
      }
      return new Intl.DateTimeFormat("fa-IR-u-ca-persian", { month: "long", year: "numeric" }).format(calendarFocusDate);
    }

    function calendarNavigation(position) {
      const j = gregorianToJalali(calendarFocusDate);
      const prevLabel = calendarView === "month" ? "ماه قبل" : calendarView === "week" ? "هفته قبل" : "روز قبل";
      const nextLabel = calendarView === "month" ? "ماه بعد" : calendarView === "week" ? "هفته بعد" : "روز بعد";
      const prefix = `calendar${capitalize(position)}`;
      return `
        <div class="calendar-controls" data-calendar-nav="${position}">
          <div class="segmented">
            <button type="button" data-calendar-shift="-1">${prevLabel}</button>
            <button type="button" data-calendar-today="1">امروز</button>
            <button type="button" data-calendar-shift="1">${nextLabel}</button>
          </div>
          <div class="calendar-picker" data-calendar-picker="${position}" data-picker-year="${j.jy}" data-picker-month="${j.jm}">
            <button type="button" class="blue" data-calendar-picker-toggle="${position}">انتخاب از تقویم شمسی</button>
            <div class="date-picker-popover hidden" id="${prefix}PickerPopover">
              <div class="date-picker-head">
                <button type="button" data-calendar-picker-prev="${position}">ماه قبل</button>
                <strong id="${prefix}PickerTitle">${new Intl.DateTimeFormat("fa-IR-u-ca-persian", { month: "long", year: "numeric" }).format(calendarFocusDate)}</strong>
                <button type="button" data-calendar-picker-next="${position}">ماه بعد</button>
              </div>
              <div class="date-picker-grid" id="${prefix}PickerGrid">${persianDatePickerGrid(`calendar-${position}`, j.jy, j.jm, calendarFocusDate)}</div>
            </div>
          </div>
        </div>`;
    }

    function bindCalendarNavigation() {
      document.querySelectorAll("[data-calendar-shift]").forEach((btn) => {
        btn.onclick = () => {
          const step = Number(btn.dataset.calendarShift);
          const next = new Date(calendarFocusDate);
          if (calendarView === "month") next.setMonth(next.getMonth() + step);
          if (calendarView === "week") next.setDate(next.getDate() + step * 7);
          if (calendarView === "day") next.setDate(next.getDate() + step);
          calendarFocusDate = next;
          renderMeetings();
        };
      });
      document.querySelectorAll("[data-calendar-today]").forEach((btn) => {
        btn.onclick = () => {
          calendarFocusDate = new Date();
          renderMeetings();
        };
      });
      document.querySelectorAll("[data-calendar-picker-toggle]").forEach((btn) => {
        btn.onclick = (event) => {
          event.stopPropagation();
          const key = btn.dataset.calendarPickerToggle;
          document.querySelectorAll(".date-picker-popover:not(.hidden)").forEach((picker) => {
            if (picker.id !== `calendar${capitalize(key)}PickerPopover`) picker.classList.add("hidden");
          });
          $(`calendar${capitalize(key)}PickerPopover`)?.classList.toggle("hidden");
        };
      });
      document.querySelectorAll("[data-calendar-picker-prev]").forEach((btn) => btn.onclick = () => shiftCalendarPickerMonth(btn.dataset.calendarPickerPrev, -1));
      document.querySelectorAll("[data-calendar-picker-next]").forEach((btn) => btn.onclick = () => shiftCalendarPickerMonth(btn.dataset.calendarPickerNext, 1));
      bindCalendarPickerDays();
    }

    function shiftCalendarPickerMonth(position, delta) {
      const picker = document.querySelector(`[data-calendar-picker="${position}"]`);
      if (!picker) return;
      let jy = Number(picker.dataset.pickerYear);
      let jm = Number(picker.dataset.pickerMonth) + delta;
      if (jm < 1) { jm = 12; jy--; }
      if (jm > 12) { jm = 1; jy++; }
      picker.dataset.pickerYear = jy;
      picker.dataset.pickerMonth = jm;
      const prefix = `calendar${capitalize(position)}`;
      const g = jalaliToGregorian(jy, jm, 1);
      $(`${prefix}PickerTitle`).textContent = new Intl.DateTimeFormat("fa-IR-u-ca-persian", { month: "long", year: "numeric" }).format(new Date(g.gy, g.gm - 1, g.gd));
      $(`${prefix}PickerGrid`).innerHTML = persianDatePickerGrid(`calendar-${position}`, jy, jm, calendarFocusDate);
      bindCalendarPickerDays();
    }

    function bindCalendarPickerDays() {
      document.querySelectorAll("[data-picker-day^=\"calendar-\"]").forEach((btn) => {
        btn.onclick = () => {
          calendarFocusDate = dateFromLocalValue(btn.dataset.dateValue);
          document.querySelectorAll(".date-picker-popover:not(.hidden)").forEach((picker) => picker.classList.add("hidden"));
          renderMeetings();
        };
      });
    }

    async function submitMeetingForm(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const members = Array.from(event.target.members.selectedOptions).map((o) => o.value);
      const meetingDate = new Date(form.get("meetingDateIso"));
      const [startHour, startMinute] = String(form.get("startTime")).split(":").map(Number);
      const [endHour, endMinute] = String(form.get("endTime")).split(":").map(Number);
      const startAt = new Date(meetingDate);
      startAt.setHours(startHour, startMinute, 0, 0);
      const endAt = new Date(meetingDate);
      endAt.setHours(endHour, endMinute, 0, 0);
      if (endAt <= startAt) return toast("ساعت پایان باید بعد از ساعت شروع باشد.");
      if (backendOnline) {
        try {
          await backendFetch("/api/meetings", {
            method: "POST",
            body: JSON.stringify({
              title: form.get("title").trim(),
              description: form.get("description").trim(),
              startAt: startAt.toISOString(),
              endAt: endAt.toISOString(),
              location: form.get("location").trim(),
              members
            })
          });
          $("meetingModal")?.classList.add("hidden");
          await loadBackendState();
          calendarFocusDate = startAt;
          renderMeetings();
          toast("جلسه در سیستم ثبت شد.");
        } catch (error) {
          toast(error.message);
        }
        return;
      }
      if (!members.includes(currentUser().id)) members.push(currentUser().id);
      state.meetings.unshift({ id: uid("M"), title: form.get("title").trim(), description: form.get("description").trim(), startAt: startAt.toISOString(), endAt: endAt.toISOString(), location: form.get("location").trim(), creatorId: currentUser().id, status: "scheduled", members });
      saveState();
      $("meetingModal")?.classList.add("hidden");
      calendarFocusDate = startAt;
      renderMeetings();
      toast("جلسه ثبت شد.");
    }

    function bindCalendarDrag() {
      document.querySelectorAll(".event-pill[draggable='true']").forEach((pill) => {
        pill.ondragstart = (event) => {
          event.dataTransfer.setData("text/plain", pill.dataset.meetingId);
        };
      });
      document.querySelectorAll("[data-drop-date], [data-drop-hour]").forEach((target) => {
        target.ondragover = (event) => {
          event.preventDefault();
          target.classList.add("drop-hover");
        };
        target.ondragleave = () => target.classList.remove("drop-hover");
        target.ondrop = async (event) => {
          event.preventDefault();
          target.classList.remove("drop-hover");
          const meetingId = event.dataTransfer.getData("text/plain");
          await moveMeeting(meetingId, target.dataset.dropDate, target.dataset.dropHour);
        };
      });
    }

    async function moveMeeting(meetingId, dropDate, dropHour) {
      const meeting = state.meetings.find((item) => item.id === meetingId);
      if (!meeting || !dropDate) return;
      const oldStart = new Date(meeting.startAt);
      const oldEnd = new Date(meeting.endAt);
      const duration = Math.max(30 * 60000, oldEnd - oldStart);
      const nextStart = dateFromLocalValue(dropDate);
      nextStart.setHours(dropHour !== undefined ? Number(dropHour) : oldStart.getHours(), oldStart.getMinutes(), 0, 0);
      const nextEnd = new Date(nextStart.getTime() + duration);
      if (backendOnline) {
        try {
          await backendFetch("/api/meetings/reschedule", {
            method: "PATCH",
            body: JSON.stringify({ meetingId, startAt: nextStart.toISOString(), endAt: nextEnd.toISOString() })
          });
          await loadBackendState();
          calendarFocusDate = nextStart;
          renderMeetings();
          toast("زمان جلسه جابه‌جا شد.");
        } catch (error) {
          toast(error.message);
        }
        return;
      }
      meeting.startAt = nextStart.toISOString();
      meeting.endAt = nextEnd.toISOString();
      saveState();
      calendarFocusDate = nextStart;
      renderMeetings();
      toast("زمان جلسه جابه‌جا شد.");
    }

    function sameLocalDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function timeFa(value) {
      return new Intl.DateTimeFormat("fa-IR", { hour: "2-digit", minute: "2-digit" }).format(new Date(value));
    }

    function localDateValue(date) {
      const d = new Date(date);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }

    function dateFromLocalValue(value) {
      const [year, month, day] = String(value).split("-").map(Number);
      return new Date(year, month - 1, day, 9, 0, 0, 0);
    }

    function digitsToLatin(value) {
      return String(value || "")
        .replace(/[۰-۹]/g, (d) => "۰۱۲۳۴۵۶۷۸۹".indexOf(d))
        .replace(/[٠-٩]/g, (d) => "٠١٢٣٤٥٦٧٨٩".indexOf(d));
    }

    function capitalize(value) {
      return String(value).charAt(0).toUpperCase() + String(value).slice(1);
    }

    function jalaliDateFields(prefix, date) {
      const j = gregorianToJalali(date);
      return `
        <label>سال<input id="${prefix}Year" inputmode="numeric" value="${fa(j.jy)}"></label>
        <label>ماه<input id="${prefix}Month" inputmode="numeric" value="${fa(j.jm)}"></label>
        <label>روز<input id="${prefix}Day" inputmode="numeric" value="${fa(j.jd)}"></label>`;
    }

    function setJalaliFields(prefix, date) {
      const j = gregorianToJalali(date);
      if ($(`${prefix}Year`)) $(`${prefix}Year`).value = fa(j.jy);
      if ($(`${prefix}Month`)) $(`${prefix}Month`).value = fa(j.jm);
      if ($(`${prefix}Day`)) $(`${prefix}Day`).value = fa(j.jd);
    }

    function persianDatePicker(prefix, date) {
      const selected = new Date(date);
      const j = gregorianToJalali(selected);
      return `
        <div class="full persian-date-picker" data-persian-picker="${prefix}" data-picker-year="${j.jy}" data-picker-month="${j.jm}">
          <button type="button" class="blue" data-picker-toggle="${prefix}">انتخاب از تقویم شمسی</button>
          <div class="date-picker-popover hidden" id="${prefix}PickerPopover">
            <div class="date-picker-head">
              <button type="button" data-picker-prev="${prefix}">ماه قبل</button>
              <strong id="${prefix}PickerTitle">${new Intl.DateTimeFormat("fa-IR-u-ca-persian", { month: "long", year: "numeric" }).format(selected)}</strong>
              <button type="button" data-picker-next="${prefix}">ماه بعد</button>
            </div>
            <div class="date-picker-grid" id="${prefix}PickerGrid">${persianDatePickerGrid(prefix, j.jy, j.jm, selected)}</div>
          </div>
        </div>`;
    }

    function persianDatePickerGrid(prefix, jy, jm, selectedDate) {
      const weekdays = ["ش", "ی", "د", "س", "چ", "پ", "ج"];
      const daysInMonth = jm <= 6 ? 31 : jm <= 11 ? 30 : 29;
      const first = jalaliToGregorian(jy, jm, 1);
      const firstDate = new Date(first.gy, first.gm - 1, first.gd);
      const offset = (firstDate.getDay() + 1) % 7;
      const selected = gregorianToJalali(selectedDate);
      const blanks = Array.from({ length: offset }, () => `<span></span>`).join("");
      const days = Array.from({ length: daysInMonth }, (_, index) => {
        const jd = index + 1;
        const g = jalaliToGregorian(jy, jm, jd);
        const value = localDateValue(new Date(g.gy, g.gm - 1, g.gd));
        const active = selected.jy === jy && selected.jm === jm && selected.jd === jd ? "primary" : "";
        return `<button type="button" class="${active}" data-picker-day="${prefix}" data-date-value="${value}">${fa(jd)}</button>`;
      }).join("");
      return `${weekdays.map((day) => `<span>${day}</span>`).join("")}${blanks}${days}`;
    }

    function bindPersianDatePicker(prefix) {
      const picker = document.querySelector(`[data-persian-picker="${prefix}"]`);
      if (!picker) return;
      const renderPicker = () => {
        const jy = Number(picker.dataset.pickerYear);
        const jm = Number(picker.dataset.pickerMonth);
        const selected = new Date($(`${prefix}DateIso`).value);
        const g = jalaliToGregorian(jy, jm, 1);
        $(`${prefix}PickerTitle`).textContent = new Intl.DateTimeFormat("fa-IR-u-ca-persian", { month: "long", year: "numeric" }).format(new Date(g.gy, g.gm - 1, g.gd));
        $(`${prefix}PickerGrid`).innerHTML = persianDatePickerGrid(prefix, jy, jm, selected);
        bindPickerDays();
      };
      const shiftMonth = (delta) => {
        let jy = Number(picker.dataset.pickerYear);
        let jm = Number(picker.dataset.pickerMonth) + delta;
        if (jm < 1) { jm = 12; jy--; }
        if (jm > 12) { jm = 1; jy++; }
        picker.dataset.pickerYear = jy;
        picker.dataset.pickerMonth = jm;
        renderPicker();
      };
      const bindPickerDays = () => {
        document.querySelectorAll(`[data-picker-day="${prefix}"]`).forEach((btn) => {
          btn.onclick = () => {
            const date = dateFromLocalValue(btn.dataset.dateValue);
            $(`${prefix}DateIso`).value = date.toISOString();
            $(`${prefix}DateLabel`).value = new Intl.DateTimeFormat("fa-IR-u-ca-persian", { dateStyle: "full" }).format(date);
            document.querySelectorAll(`[data-date-target="${prefix}"] button`).forEach((item) => item.classList.remove("active"));
            $(`${prefix}PickerPopover`)?.classList.add("hidden");
            renderPicker();
          };
        });
      };
      document.querySelectorAll(`[data-picker-prev="${prefix}"]`).forEach((btn) => btn.onclick = () => shiftMonth(-1));
      document.querySelectorAll(`[data-picker-next="${prefix}"]`).forEach((btn) => btn.onclick = () => shiftMonth(1));
      document.querySelectorAll(`[data-picker-toggle="${prefix}"]`).forEach((btn) => {
        btn.onclick = (event) => {
          event.stopPropagation();
          document.querySelectorAll(".date-picker-popover:not(.hidden)").forEach((popover) => {
            if (popover.id !== `${prefix}PickerPopover`) popover.classList.add("hidden");
          });
          $(`${prefix}PickerPopover`)?.classList.toggle("hidden");
        };
      });
      bindPickerDays();
    }

    function readJalaliFields(prefix) {
      const year = Number(digitsToLatin($(`${prefix}Year`)?.value));
      const month = Number(digitsToLatin($(`${prefix}Month`)?.value));
      const day = Number(digitsToLatin($(`${prefix}Day`)?.value));
      if (!year || !month || !day || month < 1 || month > 12 || day < 1 || day > 31) return null;
      const g = jalaliToGregorian(year, month, day);
      const date = new Date(g.gy, g.gm - 1, g.gd, 9, 0, 0, 0);
      const check = gregorianToJalali(date);
      if (check.jy !== year || check.jm !== month || check.jd !== day) return null;
      return date;
    }

    function bindJalaliPicker(prefix) {
      const btn = $(`apply${capitalize(prefix)}Date`);
      if (!btn) return;
      btn.onclick = () => {
        const date = readJalaliFields(prefix);
        if (!date) return toast("تاریخ شمسی وارد شده معتبر نیست.");
        $(`${prefix}DateIso`).value = date.toISOString();
        $(`${prefix}DateLabel`).value = new Intl.DateTimeFormat("fa-IR-u-ca-persian", { dateStyle: "full" }).format(date);
        document.querySelectorAll(`[data-date-target="${prefix}"] button`).forEach((item) => item.classList.remove("active"));
      };
    }

    function div(a, b) {
      return ~~(a / b);
    }

    function gregorianToJalali(date) {
      const gy = date.getFullYear();
      const gm = date.getMonth() + 1;
      const gd = date.getDate();
      const gdm = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
      let jy = gy <= 1600 ? 0 : 979;
      let gy2 = gy <= 1600 ? gy - 621 : gy - 1600;
      const gy3 = gm > 2 ? gy2 + 1 : gy2;
      let days = 365 * gy2 + div(gy3 + 3, 4) - div(gy3 + 99, 100) + div(gy3 + 399, 400) - 80 + gd + gdm[gm - 1];
      jy += 33 * div(days, 12053);
      days %= 12053;
      jy += 4 * div(days, 1461);
      days %= 1461;
      if (days > 365) {
        jy += div(days - 1, 365);
        days = (days - 1) % 365;
      }
      const jm = days < 186 ? 1 + div(days, 31) : 7 + div(days - 186, 30);
      const jd = 1 + (days < 186 ? days % 31 : (days - 186) % 30);
      return { jy, jm, jd };
    }

    function jalaliToGregorian(jy, jm, jd) {
      jy += jy > 979 ? -979 : 0;
      let days = 365 * jy + div(jy, 33) * 8 + div((jy % 33) + 3, 4) + 78 + jd + (jm < 7 ? (jm - 1) * 31 : (jm - 7) * 30 + 186);
      let gy = 1600 + 400 * div(days, 146097);
      days %= 146097;
      if (days > 36524) {
        gy += 100 * div(--days, 36524);
        days %= 36524;
        if (days >= 365) days++;
      }
      gy += 4 * div(days, 1461);
      days %= 1461;
      if (days > 365) {
        gy += div(days - 1, 365);
        days = (days - 1) % 365;
      }
      let gd = days + 1;
      const leap = (gy % 4 === 0 && gy % 100 !== 0) || gy % 400 === 0;
      const salA = [0, 31, leap ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
      let gm = 1;
      while (gm <= 12 && gd > salA[gm]) gd -= salA[gm++];
      return { gy, gm, gd };
    }

    function quickDate(offsetDays) {
      const date = new Date();
      date.setDate(date.getDate() + Number(offsetDays));
      date.setHours(9, 0, 0, 0);
      return date;
    }

    function quickDateIso(offsetDays) {
      return quickDate(offsetDays).toISOString();
    }

    function quickDateLabel(offsetDays) {
      return new Intl.DateTimeFormat("fa-IR-u-ca-persian", { dateStyle: "full" }).format(quickDate(offsetDays));
    }

    function bindDatePresets(target) {
      document.querySelectorAll(`[data-date-target="${target}"] [data-date-offset]`).forEach((btn) => {
        btn.onclick = () => {
          const offset = btn.dataset.dateOffset;
          document.querySelectorAll(`[data-date-target="${target}"] button`).forEach((item) => item.classList.remove("active"));

          if (target === "task") {
            $("taskDateIso").value = quickDateIso(offset);
            $("taskDateLabel").value = quickDateLabel(offset);
            syncPersianPicker("task", quickDate(offset));
          }
          if (target === "recurring") {
            $("recurringDateIso").value = quickDateIso(offset);
            $("recurringDateLabel").value = quickDateLabel(offset);
            syncPersianPicker("recurring", quickDate(offset));
          }
          if (target === "meeting") {
            $("meetingDateIso").value = quickDateIso(offset);
            $("meetingDateLabel").value = quickDateLabel(offset);
            setJalaliFields("meeting", quickDate(offset));
            syncPersianPicker("meeting", quickDate(offset));
          }
        };
      });
    }

    function syncPersianPicker(prefix, date) {
      const picker = document.querySelector(`[data-persian-picker="${prefix}"]`);
      if (!picker) return;
      const j = gregorianToJalali(date);
      picker.dataset.pickerYear = j.jy;
      picker.dataset.pickerMonth = j.jm;
      bindPersianDatePicker(prefix);
      const grid = $(`${prefix}PickerGrid`);
      if (grid) grid.innerHTML = persianDatePickerGrid(prefix, j.jy, j.jm, date);
      const title = $(`${prefix}PickerTitle`);
      if (title) title.textContent = new Intl.DateTimeFormat("fa-IR-u-ca-persian", { month: "long", year: "numeric" }).format(date);
      bindPersianDatePicker(prefix);
    }

    function parsePersianMessage(text) {
      const names = state.users.filter((u) => !u.isCeo).filter((u) => text.includes(u.fullName.split(" ")[0])).map((u) => u.id);
      if (text.includes("جلسه")) return { intent: "create_meeting", title: cleanupTitle(text, "جلسه"), members: names.length ? names : [currentUser().id], startText: text.includes("فردا") ? "فردا" : "امروز", confidence: .76, needsConfirmation: true };
      if (text.includes("مدیرعامل") || text.includes("بودجه") || text.includes("تایید")) return { intent: "create_manager_request", title: cleanupTitle(text, "درخواست"), confidence: .72, needsConfirmation: true };
      if (text.includes("وظیفه") || text.includes("کار")) return { intent: "create_task", title: cleanupTitle(text, "وظیفه"), assignees: names, dueText: text.includes("فردا") ? "فردا" : "امروز", confidence: .81, needsConfirmation: true };
      if (text.includes("وظیفه‌های من")) return { intent: "list_my_tasks", confidence: .93, needsConfirmation: false };
      return { intent: "unknown", confidence: .3, needsConfirmation: false, question: "لطفاً بفرمایید وظیفه، جلسه یا درخواست مدیرعامل می‌خواهید؟" };
    }

    function cleanupTitle(text, fallback) {
      return text.replace(/برای|بساز|ثبت کن|تا فردا|تا امروز|وظیفه|جلسه/g, "").trim().slice(0, 70) || fallback;
    }

    function confirmIntent(payload) {
      const { intent } = payload;
      if (backendOnline) {
        const createFromIntent = async () => {
          if (intent.intent === "create_task") {
            await backendFetch("/api/tasks", {
              method: "POST",
              body: JSON.stringify({
                title: intent.title,
                description: payload.text,
                groupId: currentUser().groupIds?.[0] || "g3",
                dueAt: new Date(Date.now() + 86400000).toISOString(),
                assigneeIds: intent.assignees?.length ? intent.assignees : [currentUser().id]
              })
            });
          }
          if (intent.intent === "create_long_term_task") {
            await backendFetch("/api/tasks", {
              method: "POST",
              body: JSON.stringify({
                title: intent.title,
                description: payload.text,
                groupId: currentUser().groupIds?.[0] || "g3",
                longTerm: true,
                assigneeIds: intent.assignees?.length ? intent.assignees : [currentUser().id]
              })
            });
          }
          if (intent.intent === "create_recurring_task") {
            await backendFetch("/api/recurring-tasks", {
              method: "POST",
              body: JSON.stringify({
                title: intent.title,
                description: payload.text,
                groupId: currentUser().groupIds?.[0] || "g3",
                cycle: intent.cycle || "daily",
                interval: 1,
                time: "09:00",
                startAt: new Date(Date.now() + 86400000).toISOString(),
                assigneeIds: intent.assignees?.length ? intent.assignees : [currentUser().id]
              })
            });
          }
          if (intent.intent === "create_ceo_request" || intent.intent === "create_manager_request") {
            await backendFetch("/api/ceo-requests", {
              method: "POST",
              body: JSON.stringify({ title: intent.title, description: payload.text })
            });
          }
          if (intent.intent === "create_meeting") {
            await backendFetch("/api/meetings", {
              method: "POST",
              body: JSON.stringify({
                title: intent.title,
                description: payload.text,
                startAt: new Date(Date.now() + 86400000).toISOString(),
                endAt: new Date(Date.now() + 90000000).toISOString(),
                location: "ثبت نشده",
                members: intent.members || []
              })
            });
          }
          await loadBackendState();
          renderMessenger();
          toast("عملیات در backend ثبت شد.");
        };
        createFromIntent().catch((error) => toast(error.message));
        return;
      }
      state.messages.unshift({ id: uid("MSG"), source: payload.source, sender: currentUser().telegram, text: payload.text, status: "confirmed", parsedIntent: intent });
      if (intent.intent === "create_task") {
        const assignees = intent.assignees.length ? intent.assignees : [currentUser().id];
        if (!canAssignTo(assignees)) return toast("قانون CEO اجازه ثبت مستقیم این وظیفه را نمی‌دهد.");
        state.tasks.unshift({ id: uid("T"), title: intent.title, description: payload.text, creatorId: currentUser().id, group: currentUser().group, type: "task", dueAt: new Date(Date.now() + 86400000).toISOString(), visibility: "group", assignees: assignees.map((id) => ({ userId: id, status: "pending", rejectReason: "", doneAt: "" })) });
      }
      if (intent.intent === "create_manager_request") {
        const ceo = state.users.find((u) => u.isCeo);
        state.requests.unshift({ id: uid("R"), title: intent.title, description: payload.text, requesterId: currentUser().id, ceoId: ceo.id, status: "pending", decisionReason: "", delegatedTaskId: "" });
      }
      if (intent.intent === "create_meeting") {
        state.meetings.unshift({ id: uid("M"), title: intent.title, description: payload.text, startAt: new Date(Date.now() + 86400000).toISOString(), endAt: new Date(Date.now() + 90000000).toISOString(), location: "ثبت نشده", creatorId: currentUser().id, status: "scheduled", members: [...new Set([currentUser().id, ...intent.members])] });
      }
      saveState();
      renderMessenger();
      toast("عملیات بعد از تایید کاربر ثبت شد.");
    }

    async function backendFetch(path, options = {}) {
      const base = backendBaseUrl || (location.protocol === "file:" ? "http://127.0.0.1:4188" : location.origin);
      const response = await fetch(`${base}${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          "X-Actor-Id": state.currentUserId,
          ...(options.headers || {})
        }
      });
      const body = await response.json();
      if (!response.ok) throw new Error(body.error || body.reason || body.body || "خطای ارتباط با backend");
      return body;
    }

    async function saveAiSettingsFromForm(formElement) {
      const form = new FormData(formElement);
      return backendFetch("/api/settings/ai", {
        method: "PUT",
        body: JSON.stringify({
          mode: form.get("mode"),
          fallbackParserEnabled: form.get("fallbackParserEnabled") === "true",
          onlineProvider: form.get("onlineProvider"),
          baseUrl: form.get("baseUrl"),
          apiKey: form.get("apiKey"),
          model: form.get("model"),
          offlineModelPath: form.get("offlineModelPath")
        })
      });
    }

    function updateAiModeFields(form) {
      if (!form) return;
      const mode = form.elements.mode.value === "offline" ? "offline" : "online";
      form.querySelectorAll("[data-ai-mode]").forEach((field) => {
        const modes = field.dataset.aiMode.split(/\s+/);
        field.classList.toggle("mode-hidden", !(modes.includes("both") || modes.includes(mode)));
      });
      if (mode === "offline" && form.onlineProvider.value !== "ollama") form.onlineProvider.value = "ollama";
      if (mode === "online" && form.onlineProvider.value === "ollama") form.onlineProvider.value = "openrouter";
      applyAiProviderDefaults(form);
    }

    function applyAiProviderDefaults(form) {
      if (!form) return;
      const provider = form.elements.onlineProvider.value;
      if (provider === "openrouter") {
        if (!form.elements.baseUrl.value) form.elements.baseUrl.value = "https://openrouter.ai/api/v1";
        if (!form.elements.model.value || form.elements.model.value === "gpt-4o-mini") form.elements.model.value = "openrouter/free";
      }
      if (provider === "ollama") {
        if (!form.elements.baseUrl.value || form.elements.baseUrl.value.includes("openrouter.ai")) form.elements.baseUrl.value = "http://127.0.0.1:11434";
        if (!form.elements.model.value || form.elements.model.value === "openrouter/free") form.elements.model.value = "qwen3:3b";
      }
    }

    function renderRules() {
      if (!backendOnline && !MOCK_DATA_ENABLED) {
        $("view-rules").innerHTML = backendRequired("قوانین دسترسی", "قوانین واقعی باید در backend enforce شوند، نه فقط در UI. این صفحه بدون backend mock نشان نمی‌دهد.");
        bindBackendGate();
        return;
      }
      const rows = [
        ["R-CEO-01", "هیچ‌کس وظایف مدیرعامل را نمی‌بیند مگر خود CEO یا نقش مجاز."],
        ["R-CEO-02", "تعریف مستقیم وظیفه برای CEO فقط توسط خود CEO مجاز است."],
        ["R-CEO-03", "درخواست از مدیرعامل فقط برای درخواست‌کننده و CEO قابل مشاهده است."],
        ["R-TASK-02", "هر مسئول وظیفه می‌تواند قبول، رد یا Done کند."],
        ["R-NOTIF-01", "در Assign، سررسید و تکمیل نهایی نوتیف ساخته می‌شود."],
        ["R-UI-01", "تمام رابط فارسی، RTL، شمسی و با اعداد فارسی نمایش داده می‌شود."]
      ];
      $("view-rules").innerHTML = `<div class="panel"><h2>قوانین پیاده‌سازی‌شده در MVP</h2><div class="list">${rows.map(([code, text]) => `<article class="item-card"><div class="item-top"><div style="display:flex; gap:10px; align-items:flex-start;"><span class="card-icon">${icons.rules}</span><div><div class="chips"><span class="chip blue">${code}</span></div><p>${text}</p></div></div></div></article>`).join("")}</div></div>`;
    }

    function bindGoButtons() {
      document.querySelectorAll("[data-go]").forEach((btn) => {
        btn.onclick = () => {
          activePage = btn.dataset.go;
          localStorage.setItem(activePageKey, activePage);
          render();
        };
      });
      bindTaskActions();
      bindRequestActions();
    }

    function empty(text) {
      return `<div class="item-card"><p class="muted">${text}</p></div>`;
    }

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      document.querySelectorAll(".modal-backdrop:not(.hidden)").forEach((modal) => modal.classList.add("hidden"));
      document.querySelectorAll(".date-picker-popover:not(.hidden)").forEach((picker) => picker.classList.add("hidden"));
    });

    document.addEventListener("click", (event) => {
      if (event.target.closest(".persian-date-picker, .calendar-picker")) return;
      document.querySelectorAll(".date-picker-popover:not(.hidden)").forEach((picker) => picker.classList.add("hidden"));
    });

    function backendRequired(featureName, details = "") {
      return `
        <div class="panel">
          <div class="panel-head">
            <div style="display:flex; gap:10px; align-items:center;">
              <span class="card-icon">${icons.lock}</span>
              <div>
                <h2>${featureName} هنوز به backend متصل نیست</h2>
                <p class="muted small">این صفحه دیگر mock data نشان نمی‌دهد. برای استفاده واقعی باید backend Node اجرا یا deploy شود.</p>
              </div>
            </div>
            <span class="chip danger">Backend Required</span>
          </div>
          ${details ? `<div class="backend-warning">${details}</div>` : ""}
          <div class="form-grid">
            <label class="full">Backend URL
              <input id="backendUrlInput" value="${backendBaseUrl || ""}" placeholder="مثلاً https://your-service.onrender.com">
            </label>
          </div>
          <div class="item-actions">
            <button class="primary" id="saveBackendUrl">ذخیره و تست اتصال</button>
            <button class="blue" id="useLocalBackend">استفاده از backend محلی</button>
          </div>
          <pre>Local: http://127.0.0.1:4188
Online: https://YOUR-SERVICE.onrender.com</pre>
        </div>`;
    }

    async function checkBackend() {
      backendChecked = true;
      try {
        await backendFetch("/api/health");
        backendOnline = true;
      } catch {
        backendOnline = false;
      }
    }

    function bindBackendGate() {
      const save = $("saveBackendUrl");
      const local = $("useLocalBackend");
      if (save) {
        save.onclick = async () => {
          backendBaseUrl = $("backendUrlInput").value.trim().replace(/\/$/, "");
          localStorage.setItem("ceo-office-backend-url", backendBaseUrl);
          await checkBackend();
          render();
          toast(backendOnline ? "backend متصل شد." : "اتصال backend برقرار نشد.");
        };
      }
      if (local) {
        local.onclick = async () => {
          backendBaseUrl = "http://127.0.0.1:4188";
          localStorage.setItem("ceo-office-backend-url", backendBaseUrl);
          await checkBackend();
          render();
          toast(backendOnline ? "backend محلی متصل شد." : "backend محلی اجرا نیست.");
        };
      }
    }

    async function boot() {
      if (!backendBaseUrl && location.protocol !== "file:") backendBaseUrl = location.origin;
      await checkBackend();
      if (backendOnline) {
        try {
          await loadBackendState();
        } catch (error) {
          backendOnline = false;
        }
      }
      render();
    }

    boot();
  </script>
</body>
</html>
